name: Elpriset
options:
  bundleIdPrefix: se.elpriset
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete

configs:
  Debug: debug
  Release: release

targets:
  Elpriset:
    type: application
    platform: iOS
    sources:
      - path: Elpriset
    dependencies:
      - target: ElprisetShared
      - target: ElprisetWidget
        embed: true
        codeSign: true
    settings:
      base:
        INFOPLIST_FILE: Elpriset/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Elpriset/Resources/Elpriset.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: se.elpriset.app
    entitlements:
      path: Elpriset/Resources/Elpriset.entitlements
      properties:
        com.apple.security.application-groups:
          - group.se.elpriset.shared

  ElprisetShared:
    type: framework
    platform: iOS
    sources:
      - path: ElprisetShared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: se.elpriset.shared
        SKIP_INSTALL: true
        GENERATE_INFOPLIST_FILE: true

  ElprisetWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ElprisetWidget/Sources
    dependencies:
      - target: ElprisetShared
    settings:
      base:
        INFOPLIST_FILE: ElprisetWidget/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ElprisetWidget/Resources/ElprisetWidget.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: se.elpriset.app.widget
    entitlements:
      path: ElprisetWidget/Resources/ElprisetWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.se.elpriset.shared
